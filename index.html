<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود مود Verity JE</title>
    <style>
        /* ---- تنظیمات کلی و انیمیشن‌ها ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #f9e47b 0%, #f5c842 50%, #e6a800 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            direction: rtl;
            transition: background 0.3s ease;
        }

        .card {
            background: rgba(255, 248, 220, 0.25);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.9s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== دکمه تغییر زبان ===== */
        .lang-switch {
            position: absolute;
            top: 20px;
            left: 25px;
            background: rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(122, 92, 0, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #3d2e00;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-switch:hover {
            background: rgba(122, 92, 0, 0.2);
            transform: scale(1.05);
            border-color: #7a5c00;
        }

        .lang-switch:active {
            transform: scale(0.95);
        }

        /* ===== عنوان ===== */
        .title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #7a5c00;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 5px;
            letter-spacing: 1px;
            animation: glowPulse 3s infinite alternate;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.3), 0 4px 8px rgba(0,0,0,0.1); }
            100% { text-shadow: 0 0 50px rgba(255, 215, 0, 0.8), 0 4px 8px rgba(0,0,0,0.1); }
        }

        .subtitle {
            color: #5a4400;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            border-bottom: 2px dashed rgba(122, 92, 0, 0.3);
            padding-bottom: 12px;
        }

        /* ===== اطلاعات مود ===== */
        .mod-info {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            padding: 18px 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        .mod-info p {
            color: #3d2e00;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 2;
        }

        .mod-info span {
            background: #7a5c00;
            color: #fff8d0;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* ===== گالری ===== */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0 30px;
        }

        .gallery img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 18px;
            border: 3px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            border-color: #ffd966;
        }

        /* ===== بخش دکمه‌های دانلود ===== */
        .download-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0 30px;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(145deg, #ffd966, #f5b342);
            color: #3d2e00;
            font-weight: 900;
            font-size: 1.2rem;
            padding: 16px 20px;
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -6px rgba(245, 179, 66, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            width: 100%;
            animation: float 3.5s ease-in-out infinite;
        }

        .btn-new {
            background: linear-gradient(145deg, #ffd966, #f5b342);
            animation-delay: 0s;
        }

        .btn-old {
            background: linear-gradient(145deg, #ffe08a, #f5c842);
            animation-delay: 0.5s;
            border-color: rgba(255, 215, 0, 0.2);
        }

        .btn-old:hover {
            background: linear-gradient(145deg, #ffeaa0, #f5c842);
        }

        .download-btn:hover {
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 18px 35px -6px rgba(245, 179, 66, 0.7);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* ===== لوگو ===== */
        .logo-section {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-rect {
            width: 200px;
            height: 80px;
            border-radius: 20px;
            border: 4px solid #7a5c00;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: #fff8d0;
        }

        .logo-rect:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.7);
        }

        .logo-rect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .footer-note {
            margin-top: 15px;
            color: #4d3a00;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.8;
        }

        /* ===== واکنش‌گرایی ===== */
        @media (max-width: 550px) {
            .card { padding: 25px 18px; }
            .title { font-size: 2.2rem; }
            .gallery img { width: 90px; height: 90px; }
            .download-btn { font-size: 1rem; padding: 14px 15px; }
            .logo-rect { width: 150px; height: 65px; }
            .lang-switch { top: 12px; left: 15px; padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- ===== دکمه تغییر زبان ===== -->
        <button class="lang-switch" id="langToggle" onclick="toggleLanguage()">
            🌐 EN
        </button>

        <!-- ===== عنوان ===== -->
        <h1 class="title" id="title">✨ Verity JE</h1>
        <p class="subtitle" id="subtitle">دستیار هوشمند شما در ماین‌کرفت</p>

        <!-- ===== اطلاعات مود ===== -->
        <div class="mod-info">
            <p id="modInfo">
                📦 مود مخصوص <span>Forge 1.20.1</span> <br>
                🛡️ کاملاً ایمن و بدون ویروس
            </p>
        </div>

        <!-- ===== دو دکمه دانلود ===== -->
        <div class="download-section">
            <a href="https://www.curseforge.com/api/v1/mods/1591438/files/8420491/download" 
               target="_blank" 
               class="download-btn btn-new" id="btnNew">
                ⬇️ دانلود آخرین نسخه (جدید)
            </a>
            <a href="https://www.curseforge.com/api/v1/mods/1591438/files/8377968/download" 
               target="_blank" 
               class="download-btn btn-old" id="btnOld">
                ⬇️ دانلود نسخه ۴.۰.۰ (کم‌حجم‌تر)
            </a>
        </div>

        <!-- ===== گالری ===== -->
        <div class="gallery">
            <img src="https://media.forgecdn.net/attachments/1781/100/2026-07-08_23-03-51-png.png" alt="اسکرین‌شات وریتی ۱">
            <img src="https://media.forgecdn.net/attachments/1762/52/2026-06-28_23-50-57-png.png" alt="اسکرین‌شات وریتی ۲">
            <img src="https://media.forgecdn.net/attachments/1781/99/2026-07-08_23-03-34-png.png" alt="اسکرین‌شات وریتی ۳">
            <img src="https://media.forgecdn.net/attachments/1762/51/2026-06-28_23-50-32-png.png" alt="اسکرین‌شات وریتی ۴">
        </div>

        <!-- ===== لوگو ===== -->
        <div class="logo-section">
            <div class="logo-rect">
                <img src="https://i.ibb.co/1tTdMGBp/minecraft-title.png" alt="لوگو وریتی">
            </div>
        </div>
        <div class="footer-note" id="footerNote">
            🔒 دانلود از منبع رسمی CurseForge
        </div>

    </div>

    <script>
        let currentLang = 'fa'; // 'fa' یا 'en'

        function toggleLanguage() {
            const btn = document.getElementById('langToggle');
            if (currentLang === 'fa') {
                // تغییر به انگلیسی
                document.getElementById('title').textContent = '✨ Verity JE';
                document.getElementById('subtitle').textContent = 'Your Smart Helper in Minecraft';
                document.getElementById('modInfo').innerHTML = 
                    '📦 Mod for <span>Forge 1.20.1</span> <br> 🛡️ Completely Safe & Virus-Free';
                document.getElementById('btnNew').textContent = '⬇️ Download Latest Version (New)';
                document.getElementById('btnOld').textContent = '⬇️ Download Version 4.0.0 (Lighter)';
                document.getElementById('footerNote').textContent = '🔒 Download from Official CurseForge';
                btn.textContent = '🌐 FA';
                document.body.style.direction = 'ltr';
                document.body.style.textAlign = 'left';
                currentLang = 'en';
            } else {
                // تغییر به فارسی
                document.getElementById('title').textContent = '✨ Verity JE';
                document.getElementById('subtitle').textContent = 'دستیار هوشمند شما در ماین‌کرفت';
                document.getElementById('modInfo').innerHTML = 
                    '📦 مود مخصوص <span>Forge 1.20.1</span> <br> 🛡️ کاملاً ایمن و بدون ویروس';
                document.getElementById('btnNew').textContent = '⬇️ دانلود آخرین نسخه (جدید)';
                document.getElementById('btnOld').textContent = '⬇️ دانلود نسخه ۴.۰.۰ (کم‌حجم‌تر)';
                document.getElementById('footerNote').textContent = '🔒 دانلود از منبع رسمی CurseForge';
                btn.textContent = '🌐 EN';
                document.body.style.direction = 'rtl';
                document.body.style.textAlign = 'center';
                currentLang = 'fa';
            }
        }
    </script>

</body>
</html>
